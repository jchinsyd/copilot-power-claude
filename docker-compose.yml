services:
  copilot-power-claude:
    build: .
    container_name: copilot-power-claude
    ports:
      - "7788:7788"
    # command removed - uses entrypoint.sh which handles CLI arguments
    environment:
      - GH_TOKEN
      - MINIMAX_API_KEY
      - DEEPSEEK_API_KEY
      - APP_DIR=/app/data
    volumes:
      - ./config.json:/app/config.json:ro
      - ${TOKEN_PATH}:/app/data
    restart: unless-stopped
    stdin_open: true
    tty: true
